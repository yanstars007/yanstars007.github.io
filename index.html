<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ff9a9e 100%);
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        h1 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 1;
        }

        .flower {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
        }

        .petal {
            position: absolute;
            width: 35px;
            height: 45px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0;
            transform-origin: center;
            box-shadow: inset -3px -3px 8px rgba(0,0,0,0.15), inset 3px 3px 8px rgba(255,255,255,0.3);
        }

        .petal-animate {
            animation: petalFall 2s ease-out forwards;
        }

        @keyframes petalFall {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0.5) rotate(var(--rot));
            }
        }

        .splash {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            animation: splashEffect 0.8s ease-out forwards;
        }

        @keyframes splashEffect {
            0% {
                opacity: 1;
                transform: scale(0);
            }
            50% {
                opacity: 0.8;
            }
            100% {
                opacity: 0;
                transform: scale(3);
            }
        }

        .center-circle {
            position: fixed;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffd700 0%, #e84a5f 100%);
            pointer-events: none;
            animation: centerPop 0.6s ease-out forwards;
        }

        @keyframes centerPop {
            0% {
                opacity: 1;
                transform: scale(0);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                opacity: 0;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <script>
        const colors = [
            '#e84a5f', '#c44569', '#ff6b81', '#ff4757', '#dc143c',
            '#b22222', '#cd5c5c', '#f08080', '#fa8072', '#ffb6c1',
            '#ff69b4', '#ff1493', '#c71585', '#db7093', '#ff6347'
        ];

        function createFlower(x, y) {
            const flower = document.createElement('div');
            flower.className = 'flower';
            flower.style.left = x + 'px';
            flower.style.top = y + 'px';
            document.body.appendChild(flower);

            // Center circle
            const center = document.createElement('div');
            center.className = 'center-circle';
            flower.appendChild(center);

            // Petals
            const petalCount = 8 + Math.floor(Math.random() * 5);
            for (let i = 0; i < petalCount; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                const angle = (i / petalCount) * 360;
                const color = colors[Math.floor(Math.random() * colors.length)];
                const distance = 60 + Math.random() * 80;
                const tx = Math.cos(angle * Math.PI / 180) * distance;
                const ty = Math.sin(angle * Math.PI / 180) * distance;
                const rot = Math.random() * 720 - 360;
                const delay = Math.random() * 0.2;

                petal.style.cssText = `
                    background: ${color};
                    --tx: ${tx}px;
                    --ty: ${ty}px;
                    --rot: ${rot}deg;
                    animation-delay: ${delay}s;
                `;
                flower.appendChild(petal);

                setTimeout(() => {
                    petal.classList.add('petal-animate');
                }, 10);
            }

            // Splash particles
            for (let i = 0; i < 12; i++) {
                const splash = document.createElement('div');
                splash.className = 'splash';
                const angle = (i / 12) * 360;
                const splashColors = ['#ff69b4', '#ff1493', '#ffb6c1', '#ffc0cb'];
                const color = splashColors[Math.floor(Math.random() * splashColors.length)];
                splash.style.cssText = `
                    background: ${color};
                    left: ${Math.cos(angle * Math.PI / 180) * 30}px;
                    top: ${Math.sin(angle * Math.PI / 180) * 30}px;
                    animation-delay: ${0.1 + Math.random() * 0.2}s;
                `;
                flower.appendChild(splash);
            }

            // Clean up
            setTimeout(() => {
                flower.remove();
            }, 2500);
        }

        // Touch events for mobile
        document.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = document.body.getBoundingClientRect();
            const x = touch.clientX;
            const y = touch.clientY;
            createFlower(x - 15, y - 15);
        }, { passive: false });

        // Click event for desktop
        document.addEventListener('click', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            createFlower(x - 15, y - 15);
        });
    </script>

</body>

</html>

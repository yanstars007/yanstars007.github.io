<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ff9a9e 100%);
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        .flower {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
        }

        .petal {
            position: absolute;
            width: 35px;
            height: 45px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0;
            transform-origin: center;
            box-shadow: inset -3px -3px 8px rgba(0,0,0,0.15), inset 3px 3px 8px rgba(255,255,255,0.3);
        }

        .petal-animate {
            animation: petalFall 2s ease-out forwards;
        }

        @keyframes petalFall {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0.5) rotate(var(--rot));
            }
        }

        .splash {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            animation: splashEffect 0.8s ease-out forwards;
        }

        @keyframes splashEffect {
            0% {
                opacity: 1;
                transform: scale(0);
            }
            50% {
                opacity: 0.8;
            }
            100% {
                opacity: 0;
                transform: scale(3);
            }
        }

        .center-circle {
            position: fixed;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffd700 0%, #e84a5f 100%);
            pointer-events: none;
            animation: centerPop 0.6s ease-out forwards;
        }

        @keyframes centerPop {
            0% {
                opacity: 1;
                transform: scale(0);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                opacity: 0;
                transform: scale(1);
            }
        }

        .heart {
            position: fixed;
            font-size: 2rem;
            pointer-events: none;
            animation: heartFloat 2s ease-out forwards;
            z-index: 2000;
        }

        @keyframes heartFloat {
            0% {
                opacity: 1;
                transform: scale(0) translateY(0);
            }
            50% {
                opacity: 1;
                transform: scale(1.2) translateY(-50px);
            }
            100% {
                opacity: 0;
                transform: scale(0.8) translateY(-150px);
            }
        }

        .love-text {
            position: fixed;
            font-size: 1.5rem;
            color: #ff6b81;
            text-shadow: 0 0 10px rgba(255,107,129,0.5);
            pointer-events: none;
            animation: textFade 2.5s ease-out forwards;
            z-index: 2000;
            white-space: nowrap;
        }

        @keyframes textFade {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0.5);
            }
            20% {
                opacity: 1;
                transform: translateY(-20px) scale(1);
            }
            80% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-80px) scale(0.8);
            }
        }

        .falling-heart {
            position: fixed;
            font-size: 1.5rem;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 1500;
        }

        @keyframes fall {
            0% {
                opacity: 1;
                transform: translateY(-50px) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(110vh) rotate(360deg);
            }
        }

        .bubble {
            position: fixed;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(255,107,129,0.4));
            pointer-events: none;
            animation: bubbleFloat 2s ease-out forwards;
            z-index: 1800;
        }

        @keyframes bubbleFloat {
            0% {
                opacity: 1;
                transform: scale(0);
            }
            50% {
                opacity: 0.8;
            }
            100% {
                opacity: 0;
                transform: scale(1.5) translateY(-100px);
            }
        }

        .guide {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            text-align: center;
            pointer-events: none;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .sparkle {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle 1s ease-out forwards;
        }

        @keyframes sparkle {
            0% {
                opacity: 1;
                transform: scale(0);
            }
            50% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0.5);
            }
        }
    </style>
</head>

<body>

    <div class="guide">轻触屏幕 ♥ 释放浪漫</div>

    <script>
        const colors = [
            '#e84a5f', '#c44569', '#ff6b81', '#ff4757', '#dc143c',
            '#b22222', '#cd5c5c', '#f08080', '#fa8072', '#ffb6c1',
            '#ff69b4', '#ff1493', '#c71585', '#db7093', '#ff6347'
        ];

        const loveWords = [
            '喜欢你', '爱你', '么么哒', '比心', '甜甜的',
            '好想你', '想抱抱', '你是我的', '心肝宝贝', '小可爱',
            '最爱你了', '乖乖', '宝贝', '亲亲', '爱你哟'
        ];

        const hearts = ['❤️', '💕', '💖', '💗', '💓', '💘', '💝'];

        let lastTap = 0;
        let longPressTimer = null;

        function createFlower(x, y) {
            const flower = document.createElement('div');
            flower.className = 'flower';
            flower.style.left = x + 'px';
            flower.style.top = y + 'px';
            document.body.appendChild(flower);

            const center = document.createElement('div');
            center.className = 'center-circle';
            flower.appendChild(center);

            const petalCount = 8 + Math.floor(Math.random() * 5);
            for (let i = 0; i < petalCount; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                const angle = (i / petalCount) * 360;
                const color = colors[Math.floor(Math.random() * colors.length)];
                const distance = 60 + Math.random() * 80;
                const tx = Math.cos(angle * Math.PI / 180) * distance;
                const ty = Math.sin(angle * Math.PI / 180) * distance;
                const rot = Math.random() * 720 - 360;
                const delay = Math.random() * 0.2;

                petal.style.cssText = `
                    background: ${color};
                    --tx: ${tx}px;
                    --ty: ${ty}px;
                    --rot: ${rot}deg;
                    animation-delay: ${delay}s;
                `;
                flower.appendChild(petal);

                setTimeout(() => {
                    petal.classList.add('petal-animate');
                }, 10);
            }

            for (let i = 0; i < 12; i++) {
                const splash = document.createElement('div');
                splash.className = 'splash';
                const angle = (i / 12) * 360;
                const splashColors = ['#ff69b4', '#ff1493', '#ffb6c1', '#ffc0cb'];
                const color = splashColors[Math.floor(Math.random() * splashColors.length)];
                splash.style.cssText = `
                    background: ${color};
                    left: ${Math.cos(angle * Math.PI / 180) * 30}px;
                    top: ${Math.sin(angle * Math.PI / 180) * 30}px;
                    animation-delay: ${0.1 + Math.random() * 0.2}s;
                `;
                flower.appendChild(splash);
            }

            setTimeout(() => {
                flower.remove();
            }, 2500);
        }

        function showHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = (x - 1) + 'px';
            heart.style.top = (y - 1) + 'px';
            document.body.appendChild(heart);

            const text = document.createElement('div');
            text.className = 'love-text';
            text.textContent = loveWords[Math.floor(Math.random() * loveWords.length)];
            text.style.left = (x - 50) + 'px';
            text.style.top = (y + 20) + 'px';
            document.body.appendChild(text);

            setTimeout(() => {
                heart.remove();
                text.remove();
            }, 2500);
        }

        function createSparkles(x, y) {
            for (let i = 0; i < 15; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                const color = colors[Math.floor(Math.random() * colors.length)];
                const angle = Math.random() * Math.PI * 2;
                const distance = 30 + Math.random() * 50;
                sparkle.style.cssText = `
                    background: ${color};
                    left: ${x + Math.cos(angle) * distance}px;
                    top: ${y + Math.sin(angle) * distance}px;
                    animation-delay: ${Math.random() * 0.3}s;
                `;
                document.body.appendChild(sparkle);

                setTimeout(() => sparkle.remove(), 1500);
            }
        }

        function createBubbleRain(x, y) {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const bubble = document.createElement('div');
                    bubble.className = 'bubble';
                    bubble.style.left = (x - 15 + Math.random() * 30) + 'px';
                    bubble.style.top = (y - 15 + Math.random() * 30) + 'px';
                    document.body.appendChild(bubble);

                    setTimeout(() => bubble.remove(), 2000);
                }, i * 50);
            }
        }

        function createFallingHeart() {
            const heart = document.createElement('div');
            heart.className = 'falling-heart';
            heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * window.innerWidth + 'px';
            heart.style.animationDuration = (3 + Math.random() * 3) + 's';
            document.body.appendChild(heart);

            setTimeout(() => heart.remove(), 6000);
        }

        function createFloatingHearts(x, y) {
            for (let i = 0; i < 8; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = '❤️';
                const angle = (i / 8) * 360;
                const distance = 80 + Math.random() * 40;
                heart.style.cssText = `
                    left: ${x + Math.cos(angle * Math.PI / 180) * distance}px;
                    top: ${y + Math.sin(angle * Math.PI / 180) * distance}px;
                    animation-delay: ${i * 0.1}s;
                    animation-duration: 1.5s;
                `;
                document.body.appendChild(heart);

                setTimeout(() => heart.remove(), 2000);
            }
        }

        // 定时飘落爱心
        setInterval(() => {
            if (Math.random() > 0.5) {
                createFallingHeart();
            }
        }, 1500);

        // 定时自动飘落更多爱心
        setTimeout(() => {
            setInterval(() => {
                for (let i = 0; i < 3; i++) {
                    setTimeout(createFallingHeart, i * 300);
                }
            }, 8000);
        }, 5000);

        // Touch events
        document.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const x = touch.clientX;
            const y = touch.clientY;

            const now = Date.now();
            if (now - lastTap < 300) {
                createBubbleRain(x, y);
                createFloatingHearts(x, y);
                lastTap = 0;
            } else {
                lastTap = now;
                createFlower(x - 15, y - 15);
                showHeart(x, y);
                createSparkles(x, y);
            }

            longPressTimer = setTimeout(() => {
                createFloatingHearts(x, y);
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => createFallingHeart(), i * 200);
                }
            }, 500);
        }, { passive: false });

        document.addEventListener('touchend', () => {
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
        });

        document.addEventListener('touchmove', () => {
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
        });

        // Click event for desktop
        document.addEventListener('click', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            createFlower(x - 15, y - 15);
            showHeart(x, y);
            createSparkles(x, y);
        });

        document.addEventListener('dblclick', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            createBubbleRain(x, y);
            createFloatingHearts(x, y);
        });

        // 摇晃检测
        if (window.DeviceMotionEvent) {
            let lastX, lastY, lastZ;
            let shakeCount = 0;

            window.addEventListener('devicemotion', (e) => {
                const x = e.accelerationIncludingGravity.x;
                const y = e.accelerationIncludingGravity.y;
                const z = e.accelerationIncludingGravity.z;

                if (lastX && lastY && lastZ) {
                    const deltaX = Math.abs(x - lastX);
                    const deltaY = Math.abs(y - lastY);
                    const deltaZ = Math.abs(z - lastZ);

                    if (deltaX > 15 || deltaY > 15 || deltaZ > 15) {
                        shakeCount++;
                        if (shakeCount > 3) {
                            for (let i = 0; i < 10; i++) {
                                setTimeout(createFallingHeart, i * 150);
                            }
                            shakeCount = 0;
                        }
                    }
                }

                lastX = x;
                lastY = y;
                lastZ = z;
            });
        }
    </script>

</body>

</html>

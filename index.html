<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>登录页面</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ff9a9e 100%);
      min-height: 100vh;
      overflow: hidden;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    .login-container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
      width: 90%;
      max-width: 380px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: opacity 0.5s ease, transform 0.5s ease;
      z-index: 100;
    }

    .login-container.hidden {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.8);
      pointer-events: none;
    }

    .login-title {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 26px;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #f0f0f0;
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #ff69b4;
    }

    .form-group input.error {
      border-color: #e74c3c;
    }

    .error-message {
      color: #e74c3c;
      font-size: 13px;
      margin-top: 6px;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 105, 180, 0.4);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      padding: 12px;
      border-radius: 8px;
      margin-top: 20px;
      text-align: center;
      font-weight: 500;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
    }

    .flower {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
    }

    .petal {
      position: absolute;
      width: 35px;
      height: 45px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      opacity: 0;
      transform-origin: center;
      box-shadow: inset -3px -3px 8px rgba(0,0,0,0.15), inset 3px 3px 8px rgba(255,255,255,0.3);
    }

    .petal-animate {
      animation: petalFall 2s ease-out forwards;
    }

    @keyframes petalFall {
      0% { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.5) rotate(var(--rot)); }
    }

    .splash {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      pointer-events: none;
      animation: splashEffect 0.8s ease-out forwards;
    }

    @keyframes splashEffect {
      0% { opacity: 1; transform: scale(0); }
      50% { opacity: 0.8; }
      100% { opacity: 0; transform: scale(3); }
    }

    .center-circle {
      position: fixed;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffd700 0%, #e84a5f 100%);
      pointer-events: none;
      animation: centerPop 0.6s ease-out forwards;
    }

    @keyframes centerPop {
      0% { opacity: 1; transform: scale(0); }
      50% { transform: scale(1.2); }
      100% { opacity: 0; transform: scale(1); }
    }

    .heart {
      position: fixed;
      font-size: 2rem;
      pointer-events: none;
      animation: heartFloat 2s ease-out forwards;
      z-index: 2000;
    }

    @keyframes heartFloat {
      0% { opacity: 1; transform: scale(0) translateY(0); }
      50% { opacity: 1; transform: scale(1.2) translateY(-50px); }
      100% { opacity: 0; transform: scale(0.8) translateY(-150px); }
    }

    .love-text {
      position: fixed;
      font-size: 1.5rem;
      color: #ff6b81;
      text-shadow: 0 0 10px rgba(255,107,129,0.5);
      pointer-events: none;
      animation: textFade 2.5s ease-out forwards;
      z-index: 2000;
      white-space: nowrap;
    }

    @keyframes textFade {
      0% { opacity: 0; transform: translateY(0) scale(0.5); }
      20% { opacity: 1; transform: translateY(-20px) scale(1); }
      80% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-80px) scale(0.8); }
    }

    .falling-heart {
      position: fixed;
      font-size: 1.5rem;
      pointer-events: none;
      animation: fall linear forwards;
      z-index: 1500;
    }

    @keyframes fall {
      0% { opacity: 1; transform: translateY(-50px) rotate(0deg); }
      100% { opacity: 0; transform: translateY(110vh) rotate(360deg); }
    }

    .sparkle {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      pointer-events: none;
      animation: sparkle 1s ease-out forwards;
    }

    @keyframes sparkle {
      0% { opacity: 1; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.5); }
    }

    .center-heart {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 120px;
      height: 108px;
      transform: translate(-50%, -50%);
      animation: breathe 2.5s ease-in-out infinite;
      z-index: 1;
      transition: opacity 0.5s ease;
    }

    .center-heart.hidden {
      opacity: 0;
    }

    .center-heart::before,
    .center-heart::after {
      content: '';
      position: absolute;
      width: 60px;
      height: 90px;
      background: linear-gradient(135deg, #ff69b4 0%, #ff1493 50%, #ff69b4 100%);
      border-radius: 60px 60px 0 0;
      box-shadow: 0 0 30px rgba(255, 105, 180, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.3);
    }

    .center-heart::before {
      left: 60px;
      transform: rotate(-45deg);
      transform-origin: 0 100%;
    }

    .center-heart::after {
      left: 0;
      transform: rotate(45deg);
      transform-origin: 100% 100%;
    }

    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.15); }
    }

    .welcome-text {
      position: fixed;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 1.5rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      z-index: 50;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="center-heart" :class="{ hidden: loggedIn }"></div>
    
    <div v-if="loggedIn" class="welcome-text">欢迎回来，{{ username }} ♥</div>

    <div class="login-container" :class="{ hidden: loggedIn }">
      <h1 class="login-title">欢迎登录</h1>
      
      <form @submit.prevent="handleLogin">
        <div class="form-group">
          <label for="username">用户名</label>
          <input 
            type="text" 
            id="username" 
            v-model="username" 
            :class="{ error: errors.username }"
            placeholder="请输入用户名"
          />
          <div v-if="errors.username" class="error-message">{{ errors.username }}</div>
        </div>

        <div class="form-group">
          <label for="password">密码</label>
          <input 
            type="password" 
            id="password" 
            v-model="password" 
            :class="{ error: errors.password }"
            placeholder="请输入密码"
          />
          <div v-if="errors.password" class="error-message">{{ errors.password }}</div>
        </div>

        <button type="submit" class="login-btn" :disabled="loading">
          {{ loading ? '登录中...' : '登录' }}
        </button>
      </form>

      <div v-if="message" :class="['message', messageType]">
        {{ messageText }}
      </div>
    </div>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          username: '',
          password: '',
          errors: { username: '', password: '' },
          loading: false,
          message: null,
          messageType: '',
          loggedIn: false
        }
      },
      computed: {
        messageText() { return this.message; }
      },
      methods: {
        validate() {
          this.errors = { username: '', password: '' };
          let isValid = true;
          if (!this.username.trim()) {
            this.errors.username = '用户名不能为空';
            isValid = false;
          }
          if (!this.password) {
            this.errors.password = '密码不能为空';
            isValid = false;
          } else if (this.password.length < 6) {
            this.errors.password = '密码长度至少为 6 位';
            isValid = false;
          }
          return isValid;
        },
        async handleLogin() {
          if (!this.validate()) return;
          this.loading = true;
          this.message = null;
          await new Promise(resolve => setTimeout(resolve, 1000));
          if (this.username === 'admin' && this.password === '123456') {
            this.loggedIn = true;
            localStorage.setItem('loggedIn', 'true');
            localStorage.setItem('username', this.username);
          } else {
            this.message = '用户名或密码错误（演示: admin/123456）';
            this.messageType = 'error';
          }
          this.loading = false;
        }
      },
      mounted() {
        if (localStorage.getItem('loggedIn') === 'true') {
          this.loggedIn = true;
          this.username = localStorage.getItem('username') || '用户';
        }
      }
    }).mount('#app');

    // 花瓣特效
    const colors = ['#e84a5f', '#c44569', '#ff6b81', '#ff4757', '#dc143c', '#b22222', '#cd5c5c', '#f08080', '#fa8072', '#ffb6c1', '#ff69b4', '#ff1493', '#c71585', '#db7093', '#ff6347'];
    const loveWords = ['喜欢你', '爱你', '么么哒', '比心', '甜甜的', '好想你', '想抱抱', '你是我的', '心肝宝贝', '小可爱', '最爱你了', '乖乖', '宝贝', '亲亲', '爱你哟'];
    const hearts = ['���️', '💕', '💖', '💗', '💓', '💘', '💝'];

    function createFlower(x, y) {
      const flower = document.createElement('div');
      flower.className = 'flower';
      flower.style.left = x + 'px';
      flower.style.top = y + 'px';
      document.body.appendChild(flower);
      const center = document.createElement('div');
      center.className = 'center-circle';
      flower.appendChild(center);
      const petalCount = 8 + Math.floor(Math.random() * 5);
      for (let i = 0; i < petalCount; i++) {
        const petal = document.createElement('div');
        petal.className = 'petal';
        const angle = (i / petalCount) * 360;
        const color = colors[Math.floor(Math.random() * colors.length)];
        const distance = 60 + Math.random() * 80;
        const tx = Math.cos(angle * Math.PI / 180) * distance;
        const ty = Math.sin(angle * Math.PI / 180) * distance;
        const rot = Math.random() * 720 - 360;
        const delay = Math.random() * 0.2;
        petal.style.cssText = `background: ${color}; --tx: ${tx}px; --ty: ${ty}px; --rot: ${rot}deg; animation-delay: ${delay}s;`;
        flower.appendChild(petal);
        setTimeout(() => petal.classList.add('petal-animate'), 10);
      }
      for (let i = 0; i < 12; i++) {
        const splash = document.createElement('div');
        splash.className = 'splash';
        const angle = (i / 12) * 360;
        const splashColors = ['#ff69b4', '#ff1493', '#ffb6c1', '#ffc0cb'];
        splash.style.cssText = `background: ${splashColors[i % 4]}; left: ${Math.cos(angle * Math.PI / 180) * 30}px; top: ${Math.sin(angle * Math.PI / 180) * 30}px; animation-delay: ${0.1 + Math.random() * 0.2}s;`;
        flower.appendChild(splash);
      }
      setTimeout(() => flower.remove(), 2500);
    }

    function showHeart(x, y) {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      heart.style.left = (x - 1) + 'px';
      heart.style.top = (y - 1) + 'px';
      document.body.appendChild(heart);
      const text = document.createElement('div');
      text.className = 'love-text';
      text.textContent = loveWords[Math.floor(Math.random() * loveWords.length)];
      text.style.left = (x - 50) + 'px';
      text.style.top = (y + 20) + 'px';
      document.body.appendChild(text);
      setTimeout(() => { heart.remove(); text.remove(); }, 2500);
    }

    function createSparkles(x, y) {
      for (let i = 0; i < 15; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        const color = colors[Math.floor(Math.random() * colors.length)];
        const angle = Math.random() * Math.PI * 2;
        const distance = 30 + Math.random() * 50;
        sparkle.style.cssText = `background: ${color}; left: ${x + Math.cos(angle) * distance}px; top: ${y + Math.sin(angle) * distance}px; animation-delay: ${Math.random() * 0.3}s;`;
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 1500);
      }
    }

    function createFallingHeart() {
      const heart = document.createElement('div');
      heart.className = 'falling-heart';
      heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      heart.style.left = Math.random() * window.innerWidth + 'px';
      heart.style.animationDuration = (3 + Math.random() * 3) + 's';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }

    // 登录后才启用特效
    const app = Vue.getMountedInstance();
    const originalMounted = Vue.createApp({}).mounted;
    
    let canInteract = false;
    
    setInterval(() => {
      if (canInteract && Math.random() > 0.5) createFallingHeart();
    }, 1500);

    document.addEventListener('touchstart', (e) => {
      if (canInteract) {
        e.preventDefault();
        const touch = e.touches[0];
        createFlower(touch.clientX - 15, touch.clientY - 15);
        showHeart(touch.clientX, touch.clientY);
        createSparkles(touch.clientX, touch.clientY);
      }
    }, { passive: false });

    document.addEventListener('click', (e) => {
      if (canInteract) {
        createFlower(e.clientX - 15, e.clientY - 15);
        showHeart(e.clientX, e.clientY);
        createSparkles(e.clientX, e.clientY);
      }
    });

    // 监听登录状态
    const observer = new MutationObserver(() => {
      const welcome = document.querySelector('.welcome-text');
      canInteract = !!welcome;
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
